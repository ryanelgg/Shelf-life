<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="#2a4f38"/>

  <!-- Shelf board -->
  <rect x="180" y="560" width="664" height="36" rx="10" fill="#c8b89a" opacity="0.9"/>

  <!-- Left bracket -->
  <rect x="220" y="560" width="16" height="120" rx="6" fill="#c8b89a" opacity="0.6"/>
  <!-- Right bracket -->
  <rect x="788" y="560" width="16" height="120" rx="6" fill="#c8b89a" opacity="0.6"/>

  <!-- Jar 1 (left) — tall jar -->
  <rect x="268" y="420" width="100" height="142" rx="14" fill="#e8dcc8"/>
  <rect x="278" y="408" width="80" height="22" rx="6" fill="#d4c5a9"/>
  <!-- lid -->
  <rect x="268" y="400" width="100" height="18" rx="6" fill="#4a7c59"/>
  <!-- label line -->
  <rect x="284" y="468" width="68" height="4" rx="2" fill="#a89070" opacity="0.6"/>
  <rect x="284" y="480" width="50" height="4" rx="2" fill="#a89070" opacity="0.4"/>

  <!-- Jar 2 (center) — round/short jar -->
  <ellipse cx="512" cy="490" rx="72" ry="78" fill="#d4e8d4"/>
  <rect x="440" y="400" width="144" height="24" rx="8" fill="#b8d4b8"/>
  <!-- lid -->
  <rect x="448" y="390" width="128" height="20" rx="6" fill="#4a7c59"/>
  <!-- label -->
  <rect x="472" y="470" width="80" height="4" rx="2" fill="#6a9a6a" opacity="0.6"/>
  <rect x="480" y="482" width="64" height="4" rx="2" fill="#6a9a6a" opacity="0.4"/>

  <!-- Jar 3 (right) — medium bottle -->
  <rect x="660" y="440" width="88" height="122" rx="14" fill="#e8dcc8"/>
  <rect x="674" y="424" width="60" height="24" rx="6" fill="#d4c5a9"/>
  <!-- lid -->
  <rect x="674" y="412" width="60" height="18" rx="6" fill="#4a7c59"/>
  <!-- label line -->
  <rect x="672" y="490" width="64" height="4" rx="2" fill="#a89070" opacity="0.6"/>
  <rect x="676" y="502" width="48" height="4" rx="2" fill="#a89070" opacity="0.4"/>

  <!-- Small leaf accent on center jar -->
  <path d="M512 430 Q530 410 548 418 Q536 440 512 430Z" fill="#4a7c59" opacity="0.7"/>

  <!-- App name -->
  <text x="512" y="740" font-family="Georgia, serif" font-size="72" font-weight="400" letter-spacing="6" text-anchor="middle" fill="#e8dcc8">SHELF LIFE</text>

  <!-- Thin underline -->
  <rect x="340" y="758" width="344" height="2" rx="1" fill="#c8b89a" opacity="0.4"/>
</svg>
