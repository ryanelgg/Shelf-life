  <!-- Label area -->
  <rect x="480" y="468" width="64" height="88" rx="5" fill="#d4c8b0" opacity="0.55"/>
  <line x1="490" y1="494" x2="534" y2="494" stroke="#a38958" stroke-width="3" opacity="0.5"/>
  <line x1="494" y1="508" x2="530" y2="508" stroke="#a38958" stroke-width="3" opacity="0.4"/>
  <!-- Bottle shine -->
  <rect x="480" y="448" width="9" height="155" rx="5" fill="white" opacity="0.2"/>

  <!-- HERB BUNCH -->
  <!-- Main stems -->
  <path d="M728 622 L728 508" stroke="#7a9048" stroke-width="9" stroke-linecap="round"/>
  <path d="M712 622 L698 498" stroke="#7a9048" stroke-width="8" stroke-linecap="round"/>
